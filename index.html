<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cheki Pocket</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --card: #ffffff;
      --text: #1f2430;
      --muted: #5a6272;
      --border: #d9deea;
      --link: #3f62d6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", "Noto Sans KR",
        "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.8rem;
      line-height: 1.3;
    }
    h2 {
      margin: 20px 0 8px;
      font-size: 1.1rem;
    }
    p {
      margin: 8px 0;
    }
    ul {
      margin: 8px 0 0;
      padding-left: 20px;
    }
    a {
      color: var(--link);
    }
    .muted {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Cheki Pocket</h1>
      <p class="muted">Google Play 公開向け情報ページ</p>

      <h2>アプリ名</h2>
      <ul>
        <li>Korea版: 체키포켓</li>
        <li>Japan版: チェキポケ</li>
      </ul>

      <h2>Developer</h2>
      <p>KLIC Labs</p>

      <h2>サポート</h2>
      <p><a href="mailto:chekipocket.app@gmail.com">chekipocket.app@gmail.com</a></p>

      <h2>ポリシー</h2>
      <p><a href="./privacy/">체키포켓 개인정보 처리방침</a></p>
      <p class="muted">Cheki Pocket Korea Privacy Policy（Korea版専用）</p>
    </section>
  </main>
</body>
</html>
